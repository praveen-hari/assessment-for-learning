site_name: Assessment for Learning - Exam Notes
site_description: MkDocs-ready exam preparation notes for Assessment for Learning
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Unit I - Basics of Assessment: unit1.md
  - Unit II - Assessment for Learning in Classroom: unit2.md
  - Unit III - Tools and Techniques for Classroom Assessment: unit3.md
  - Unit IV - Assessment Practices in Inclusive School: unit4.md
  - Unit V - Prevalent Practices of Assessment & Reporting: unit5.md
